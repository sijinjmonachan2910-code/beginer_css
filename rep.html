<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quantum Wave Interference</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #000;
        cursor: none;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let time = 0;

// Two coherent wave sources
let sources = [
    { x: w/2 - 100, y: h/2 },
    { x: w/2 + 100, y: h/2 }
];

document.addEventListener("mousemove", e => {
    sources[0].x = e.clientX;
    sources[0].y = e.clientY;
});

// Quantum wave parameters
const wavelength = 60;
const frequency = 0.03;
const speed = 0.15;

function animate() {
    time += speed;

    let image = ctx.createImageData(w, h);
    let data = image.data;

    for (let y = 0; y < h; y += 2) {
        for (let x = 0; x < w; x += 2) {

            let psi = 0;

            // Superposition principle
            for (let s of sources) {
                let dx = x - s.x;
                let dy = y - s.y;
                let r = Math.sqrt(dx*dx + dy*dy);

                psi += Math.sin((r / wavelength) - time * frequency);
            }

            // Probability amplitude |ψ|²
            let intensity = psi * psi;

            let index = (y * w + x) * 4;
            let brightness = intensity * 60;

            data[index] = brightness;       // R
            data[index + 1] = brightness;   // G
            data[index + 2] = brightness;   // B
            data[index + 3] = 255;

            // Fill neighboring pixel for density
            if (x+1 < w && y+1 < h) {
                let idx2 = ((y+1)*w + (x+1)) * 4;
                data[idx2] = brightness;
                data[idx2+1] = brightness;
                data[idx2+2] = brightness;
                data[idx2+3] = 255;
            }
        }
    }

    ctx.putImageData(image, 0, 0);
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
