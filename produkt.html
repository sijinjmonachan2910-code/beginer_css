<!DOCTYPE html>
<html>
<head>
<title>Produkt </title>

<style>

/* Product card container */
.card{
    width: 250px;
    padding: 15px;
    border: 1px solid #ccc;
    text-align: center;
    margin: 20px auto;
    font-family: Arial, sans-serif;
}

/* Product image styling */
.product-img{
    width: 100%;
    border: 2px solid black;
    border-top-left-radius: 20px;
    border-bottom-right-radius: 20px;
}

/* Button style */
button{
    padding: 10px 15px;
    margin-top: 10px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
}

/* Small screen */
@media (max-width: 600px){
    .card{
        font-size: 14px;
        text-align: center;
    }
}

/* Landscape mode */
@media (orientation: landscape){
    .card{
        background-color: lightblue;
    }
}

</style>
</head>

<body>

<div class="card">
    <img src="https://static.vecteezy.com/system/resources/thumbnails/022/908/829/small/mirror-car-new-technology-car-generative-ai-free-photo.jpeg" alt="Product Image" class="product-img">
    <h3>FUTURISTISCHES AUTO</h3>
    <button>Buy Now</button>
</div>

</body>
</html>
